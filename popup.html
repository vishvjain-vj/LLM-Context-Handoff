<!DOCTYPE html>
<html>
<head>
  <style>
    /* Gemini-inspired minimalist styling */
    body { 
      width: 250px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      background-color: #ffffff; 
      border-radius: 8px;
      position: relative;
    }
    h3 {
      margin-top: 5px;
      font-weight: 500;
      color: #000000;
    }
    /* Simple black and white button styling */
    #grabContext { 
      background-color: white; 
      color: #000000; 
      border: 2px solid #000000; /* Distinct outline */
      padding: 10px 15px; 
      width: 100%; 
      border-radius: 8px; /* Slightly more rounded like modern UI */
      cursor: pointer; 
      font-weight: bold; 
      font-size: 14px;
      transition: all 0.2s ease;
      margin-top: 10px;
    }
    #grabContext:hover { 
      background-color: #f0f0f0; /* Subtle grey hover */
    }
    #status { margin-top: 10px; font-size: 12px; color: #666; min-height: 15px; }
    
    /* Optional Close Icon Styling */
    .close-icon {
      position: absolute;
      top: 8px;
      right: 12px;
      cursor: pointer;
      font-size: 18px;
      color: #555;
    }
    .close-icon:hover { color: #000; }
  </style>
</head>
<body>
  <span class="close-icon" id="closePopup">×</span>

  <h3>LLM Handoff</h3>
  
  <button id="grabContext">Copy Context Capsule</button>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
